  name: Moodle Plugin Release

  on:
    push:
      tags:
        - v*
    workflow_dispatch:
      inputs:
        tag:
          description: 'Git tag to be released'
          required: true

  jobs:
    release:
      uses: scha-ms/moodle-workflows/.github/workflows/moodle-plugin-ci.yml@cancel-jobs-same-codebase
      secrets:
        MOODLE_ORG_TOKEN: ${{ secrets.MOODLE_ORG_TOKEN }}
